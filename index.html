<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>บัญชีรายรับรายจ่าย</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --border: #e2ddd7;
  --text: #1a1714;
  --text2: #6b6560;
  --text3: #a09890;
  --green: #2d6a4f;
  --green-bg: #d8f3dc;
  --red: #c1440e;
  --red-bg: #fde8df;
  --amber: #92600a;
  --amber-bg: #fef3cd;
  --blue: #1a4f8a;
  --blue-bg: #dbeafe;
  --purple: #6b3a7d;
  --purple-bg: #f3e8ff;
  --accent: #c1440e;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
.header {
  background: var(--text);
  color: #fff;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 15px; font-weight: 600; }
.header-sub { font-size: 10px; color: #a09890; font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
.save-badge {
  font-size: 10px;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-family: 'IBM Plex Mono', monospace;
  min-width: 70px;
  text-align: center;
  transition: all 0.3s;
}
.save-badge.saved { background: rgba(45,106,79,0.3); color: #86efac; }
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  flex: 1;
  min-width: 80px;
  padding: 12px 10px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--text2);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
.nav-btn:hover { background: var(--surface2); }
.main { max-width: 860px; margin: 0 auto; padding: 1.25rem 0.875rem 5rem; }
.section { display: none; }
.section.active { display: block; }
.metrics {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 1rem;
}
@media(min-width:600px){ .metrics { grid-template-columns: repeat(4,1fr); } }
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.875rem;
}
.metric-label { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px; }
.metric-value { font-size: 18px; font-weight: 600; line-height: 1.2; }
.metric-value.g { color: var(--green); }
.metric-value.r { color: var(--red); }
.metric-value.b { color: var(--blue); }
.metric-value.p { color: var(--purple); }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.125rem;
  margin-bottom: 1rem;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
  font-family: 'IBM Plex Mono', monospace;
}
.form-grid { display: grid; gap: 7px; margin-bottom: 7px; }
.form-2 { grid-template-columns: 1fr 1fr; }
.form-3 { grid-template-columns: 1fr 1fr 1fr; }
@media(max-width:480px) { .form-2, .form-3 { grid-template-columns: 1fr; } }
input, select, textarea {
  width: 100%;
  padding: 8px 11px;
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus, select:focus { outline: none; border-color: var(--text); }
.btn {
  padding: 8px 16px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.btn:hover { background: var(--surface2); }
.btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.btn.primary:hover { background: #333; }
.btn.danger { color: var(--red); border-color: var(--red-bg); }
.btn.danger:hover { background: var(--red-bg); }
.btn.sm { padding: 4px 9px; font-size: 11px; }
.btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 460px; }
th {
  text-align: left;
  padding: 7px 9px;
  color: var(--text3);
  font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td { padding: 9px 9px; border-bottom: 1px solid var(--border); color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
  font-family: 'IBM Plex Mono', monospace;
}
.badge.income { background: var(--green-bg); color: var(--green); }
.badge.expense { background: var(--red-bg); color: var(--red); }
.badge.pending { background: var(--amber-bg); color: var(--amber); }
.badge.paid { background: var(--green-bg); color: var(--green); }
.badge.debt { background: var(--purple-bg); color: var(--purple); }
.person-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 9px;
  margin-bottom: 1rem;
}
.person-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.person-card:hover { border-color: var(--text3); background: var(--surface); }
.person-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.person-pending { font-size: 17px; font-weight: 600; color: var(--red); font-family: 'IBM Plex Mono', monospace; }
.person-info { font-size: 10px; color: var(--text3); margin-top: 2px; }
.person-tap { font-size: 10px; color: var(--text3); margin-top: 5px; }
.chart-wrap { position: relative; width: 100%; height: 200px; }
.filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 0.875rem; }
.filter-row select, .filter-row input { width: auto; flex: 1; min-width: 110px; }
.empty { text-align: center; padding: 2rem; color: var(--text3); font-size: 13px; }
.amount-pos { font-weight: 600; color: var(--green); font-family: 'IBM Plex Mono', monospace; }
.amount-neg { font-weight: 600; color: var(--red); font-family: 'IBM Plex Mono', monospace; }
.amount-neutral { font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; font-size: 11px; color: var(--text2); }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  padding: 1rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 600px;
  padding: 1.25rem;
  margin: auto;
  position: relative;
}
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Sarabun', sans-serif;
}

/* DATALIST COMBO */
.combo-wrap { position: relative; }

/* BAR PERCENT */
.pct-bar-wrap { margin-bottom: 10px; }
.pct-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.pct-bar-track { background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
.pct-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

/* DEBT */
.debt-summary { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
.debt-stat { flex: 1; min-width: 120px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
.debt-stat-label { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; margin-bottom: 3px; }
.debt-stat-val { font-size: 17px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">บัญชีรายรับรายจ่าย</div>
    <div class="header-sub">BUDGET TRACKER</div>
  </div>
  <div class="save-badge" id="save-status">พร้อม</div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('dashboard')">ภาพรวม</button>
  <button class="nav-btn" onclick="switchTab('transactions')">รายรับ-รายจ่าย</button>
  <button class="nav-btn" onclick="switchTab('reimbursement')">สำรองจ่าย</button>
  <button class="nav-btn" onclick="switchTab('debt')">หนี้สิน</button>
</nav>

<div class="main">

  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="section active">
    <div class="metrics" id="metrics"></div>
    <div class="card">
      <div class="card-title">รายรับ vs รายจ่าย — 6 เดือนล่าสุด</div>
      <div class="chart-wrap">
        <canvas id="barChart"></canvas>
      </div>
      <div class="legend" id="barLegend"></div>
    </div>
    <div class="card">
      <div class="card-title">สัดส่วนรายจ่ายตามหมวดหมู่ (%)</div>
      <div id="pct-bars"></div>
    </div>
    <div class="card">
      <div class="card-title">กราฟวงกลมรายจ่าย</div>
      <div style="position:relative;width:100%;max-width:260px;height:180px;margin:0 auto">
        <canvas id="pieChart"></canvas>
      </div>
      <div class="legend" id="pieLegend" style="justify-content:center;margin-top:10px"></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="tab-transactions" class="section">
    <div class="card">
      <div class="card-title">เพิ่มรายการใหม่</div>
      <div class="form-grid form-2">
        <select id="t-type">
          <option value="income">รายรับ</option>
          <option value="expense">รายจ่าย</option>
        </select>
        <input type="text" id="t-cat" placeholder="หมวดหมู่ เช่น อาหาร, เงินเดือน" list="cat-list">
        <datalist id="cat-list"></datalist>
      </div>
      <div class="form-grid form-3">
        <input type="text" id="t-desc" placeholder="รายละเอียด">
        <input type="number" id="t-amount" placeholder="จำนวนเงิน (฿)" min="0" inputmode="decimal">
        <input type="date" id="t-date">
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="addTransaction()">+ เพิ่มรายการ</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">รายการทั้งหมด</div>
      <div class="filter-row">
        <select id="f-type" onchange="renderTransactions()">
          <option value="">ทุกประเภท</option>
          <option value="income">รายรับ</option>
          <option value="expense">รายจ่าย</option>
        </select>
        <input type="month" id="f-month" onchange="renderTransactions()">
      </div>
      <div class="table-wrap" id="t-table"></div>
    </div>
  </div>

  <!-- REIMBURSEMENT -->
  <div id="tab-reimbursement" class="section">
    <div class="card">
      <div class="card-title">เพิ่มรายการสำรองจ่าย</div>
      <div class="form-grid form-2">
        <div class="combo-wrap">
          <input type="text" id="r-person" placeholder="ชื่อผู้รับเงิน" list="person-list" autocomplete="off">
          <datalist id="person-list"></datalist>
        </div>
        <input type="text" id="r-desc" placeholder="รายละเอียด / รายการ">
      </div>
      <div class="form-grid form-3">
        <input type="number" id="r-amount" placeholder="จำนวนเงิน (฿)" min="0" inputmode="decimal">
        <input type="date" id="r-date">
        <input type="text" id="r-note" placeholder="หมายเหตุ (ถ้ามี)">
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="addReimbursement()">+ เพิ่มรายการ</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">ยอดรวมแต่ละคน — กดเพื่อดูรายละเอียด</div>
      <div id="person-summary"></div>
    </div>
    <div class="card">
      <div class="card-title">รายการสำรองจ่ายทั้งหมด</div>
      <div class="table-wrap" id="r-table"></div>
    </div>
  </div>

  <!-- DEBT -->
  <div id="tab-debt" class="section">
    <div class="card">
      <div class="card-title">เพิ่มรายการหนี้สิน</div>
      <div class="form-grid form-2">
        <input type="text" id="d-name" placeholder="ชื่อเจ้าหนี้ / รายการ">
        <input type="text" id="d-desc" placeholder="รายละเอียด">
      </div>
      <div class="form-grid form-3">
        <input type="number" id="d-amount" placeholder="ยอดหนี้ทั้งหมด (฿)" min="0" inputmode="decimal">
        <input type="date" id="d-due" placeholder="วันครบกำหนด">
        <input type="text" id="d-note" placeholder="หมายเหตุ">
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="addDebt()">+ เพิ่มหนี้สิน</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">สรุปหนี้สิน</div>
      <div id="debt-summary-stats"></div>
    </div>
    <div class="card">
      <div class="card-title">รายการหนี้สินทั้งหมด</div>
      <div class="table-wrap" id="d-table"></div>
    </div>
  </div>

</div>

<!-- PERSON MODAL -->
<div class="modal-overlay" id="person-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-person-name">ชื่อ</div>
      <button class="modal-close" onclick="closeModal()">ปิด ×</button>
    </div>
    <div id="modal-person-stats" style="display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap"></div>
    <div class="table-wrap" id="modal-person-table"></div>
  </div>
</div>

<script>
/* ======== DATA ======== */
let transactions = JSON.parse(localStorage.getItem('ball_tx') || '[]');
let reimbursements = JSON.parse(localStorage.getItem('ball_re') || '[]');
let debts = JSON.parse(localStorage.getItem('ball_debt') || '[]');
let barChartInst = null, pieChartInst = null;
let saveTimer = null;

function saveData() {
  try {
    localStorage.setItem('ball_tx', JSON.stringify(transactions));
    localStorage.setItem('ball_re', JSON.stringify(reimbursements));
    localStorage.setItem('ball_debt', JSON.stringify(debts));
    showStatus('บันทึกแล้ว', 'saved');
  } catch(e) {
    showStatus('ข้อผิดพลาด', 'error');
  }
}
function showStatus(msg, cls) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'save-badge ' + (cls || '');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { el.textContent = ''; el.className = 'save-badge'; }, 2000);
}

/* ======== FORMAT ======== */
function fmt(n) {
  const num = Number(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
}
function fmtDate(d) {
  if (!d) return '';
  const p = d.split('-');
  if (p.length < 3) return d;
  return p[2] + '/' + p[1] + '/' + p[0];
}

/* ======== TAB ======== */
function switchTab(t) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${t}')"]`).classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'dashboard') renderDashboard();
  if (t === 'transactions') { updateCatList(); renderTransactions(); }
  if (t === 'reimbursement') { updatePersonList(); renderReimbursement(); }
  if (t === 'debt') renderDebt();
}

/* ======== DATALIST ======== */
function updatePersonList() {
  const names = [...new Set(reimbursements.map(r => r.person).filter(Boolean))];
  document.getElementById('person-list').innerHTML = names.map(n => `<option value="${n}">`).join('');
}
function updateCatList() {
  const cats = [...new Set(transactions.map(t => t.cat).filter(Boolean))];
  document.getElementById('cat-list').innerHTML = cats.map(c => `<option value="${c}">`).join('');
}

/* ======== TRANSACTIONS ======== */
function addTransaction() {
  const type = document.getElementById('t-type').value;
  const cat = document.getElementById('t-cat').value.trim();
  const desc = document.getElementById('t-desc').value.trim();
  const amount = parseFloat(document.getElementById('t-amount').value);
  const date = document.getElementById('t-date').value;
  if (!desc || !amount || isNaN(amount) || amount <= 0 || !date) {
    alert('กรุณากรอกข้อมูลให้ครบ (รายละเอียด, จำนวนเงิน, วันที่)');
    return;
  }
  transactions.unshift({ id: Date.now(), type, cat: cat || 'ทั่วไป', desc, amount, date });
  saveData();
  document.getElementById('t-cat').value = '';
  document.getElementById('t-desc').value = '';
  document.getElementById('t-amount').value = '';
  updateCatList();
  renderTransactions();
  renderDashboard();
}
function deleteTransaction(id) {
  if (!confirm('ลบรายการนี้?')) return;
  transactions = transactions.filter(t => t.id !== id);
  saveData(); renderTransactions(); renderDashboard();
}
function renderTransactions() {
  const fType = document.getElementById('f-type').value;
  const fMonth = document.getElementById('f-month').value;
  let list = transactions.filter(t => {
    if (fType && t.type !== fType) return false;
    if (fMonth && !t.date.startsWith(fMonth)) return false;
    return true;
  });
  const el = document.getElementById('t-table');
  if (!list.length) { el.innerHTML = '<p class="empty">ไม่มีรายการค่ะ</p>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>รายละเอียด</th><th style="text-align:right">จำนวน (฿)</th><th></th></tr></thead>
    <tbody>` + list.map(t => `<tr>
      <td style="white-space:nowrap">${fmtDate(t.date)}</td>
      <td><span class="badge ${t.type}">${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'}</span></td>
      <td>${escHtml(t.cat)}</td>
      <td>${escHtml(t.desc)}</td>
      <td style="text-align:right"><span class="${t.type === 'income' ? 'amount-pos' : 'amount-neg'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span></td>
      <td><button class="btn sm danger" onclick="deleteTransaction(${t.id})">ลบ</button></td>
    </tr>`).join('') + '</tbody></table>';
}

/* ======== REIMBURSEMENT ======== */
function addReimbursement() {
  const person = document.getElementById('r-person').value.trim();
  const desc = document.getElementById('r-desc').value.trim();
  const amount = parseFloat(document.getElementById('r-amount').value);
  const date = document.getElementById('r-date').value;
  const note = document.getElementById('r-note').value.trim();
  if (!person || !desc || !amount || isNaN(amount) || amount <= 0 || !date) {
    alert('กรุณากรอกข้อมูลให้ครบ');
    return;
  }
  reimbursements.unshift({ id: Date.now(), person, desc, amount, date, note, status: 'pending' });
  saveData();
  document.getElementById('r-person').value = '';
  document.getElementById('r-desc').value = '';
  document.getElementById('r-amount').value = '';
  document.getElementById('r-note').value = '';
  updatePersonList();
  renderReimbursement();
}
function toggleStatus(id) {
  const r = reimbursements.find(x => x.id === id);
  if (r) r.status = r.status === 'pending' ? 'paid' : 'pending';
  saveData(); renderReimbursement();
}
function deleteReimbursement(id) {
  if (!confirm('ลบรายการนี้?')) return;
  reimbursements = reimbursements.filter(r => r.id !== id);
  saveData(); renderReimbursement();
  updatePersonList();
}
function renderReimbursement() {
  const personTotals = {};
  reimbursements.forEach(r => {
    if (!personTotals[r.person]) personTotals[r.person] = { total: 0, pending: 0, count: 0, paid: 0 };
    personTotals[r.person].total += r.amount;
    personTotals[r.person].count++;
    if (r.status === 'pending') personTotals[r.person].pending += r.amount;
    else personTotals[r.person].paid += r.amount;
  });
  const names = Object.keys(personTotals);
  const ps = document.getElementById('person-summary');
  ps.innerHTML = names.length
    ? '<div class="person-grid">' + names.map(n => `<div class="person-card" onclick="openPersonModal('${escAttr(n)}')">
        <div class="person-name">${escHtml(n)}</div>
        <div class="person-pending">฿${fmt(personTotals[n].pending)}</div>
        <div class="person-info">ค้างรับ / รวม ฿${fmt(personTotals[n].total)} · ${personTotals[n].count} รายการ</div>
        <div class="person-tap">👆 กดดูรายละเอียด</div>
      </div>`).join('') + '</div>'
    : '<p class="empty">ยังไม่มีรายการค่ะ</p>';

  const el = document.getElementById('r-table');
  if (!reimbursements.length) { el.innerHTML = '<p class="empty">ยังไม่มีรายการค่ะ</p>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>วันที่</th><th>ชื่อ</th><th>รายละเอียด</th><th>หมายเหตุ</th><th style="text-align:right">จำนวน (฿)</th><th>สถานะ</th><th></th></tr></thead>
    <tbody>` + reimbursements.map(r => `<tr>
      <td style="white-space:nowrap">${fmtDate(r.date)}</td>
      <td style="font-weight:600">${escHtml(r.person)}</td>
      <td>${escHtml(r.desc)}</td>
      <td style="color:var(--text3)">${r.note ? escHtml(r.note) : '-'}</td>
      <td style="text-align:right"><span class="amount-neutral">฿${fmt(r.amount)}</span></td>
      <td><button class="btn sm" onclick="toggleStatus(${r.id})" style="${r.status === 'paid' ? 'color:var(--green);border-color:var(--green-bg)' : 'color:var(--amber);border-color:var(--amber-bg)'}">${r.status === 'paid' ? 'รับแล้ว' : 'รอรับ'}</button></td>
      <td><button class="btn sm danger" onclick="deleteReimbursement(${r.id})">ลบ</button></td>
    </tr>`).join('') + '</tbody></table>';
}

/* ======== PERSON MODAL ======== */
function openPersonModal(name) {
  const items = reimbursements.filter(r => r.person === name);
  const total = items.reduce((s, r) => s + r.amount, 0);
  const pending = items.filter(r => r.status === 'pending').reduce((s, r) => s + r.amount, 0);
  const paid = items.filter(r => r.status === 'paid').reduce((s, r) => s + r.amount, 0);

  document.getElementById('modal-person-name').textContent = name;
  document.getElementById('modal-person-stats').innerHTML = `
    <div style="flex:1;min-width:100px;background:var(--red-bg);border-radius:var(--radius-sm);padding:9px 12px">
      <div style="font-size:10px;color:var(--red);font-family:'IBM Plex Mono',monospace;margin-bottom:2px">ค้างรับ</div>
      <div style="font-size:16px;font-weight:600;color:var(--red);font-family:'IBM Plex Mono',monospace">฿${fmt(pending)}</div>
    </div>
    <div style="flex:1;min-width:100px;background:var(--green-bg);border-radius:var(--radius-sm);padding:9px 12px">
      <div style="font-size:10px;color:var(--green);font-family:'IBM Plex Mono',monospace;margin-bottom:2px">รับแล้ว</div>
      <div style="font-size:16px;font-weight:600;color:var(--green);font-family:'IBM Plex Mono',monospace">฿${fmt(paid)}</div>
    </div>
    <div style="flex:1;min-width:100px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px">
      <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-bottom:2px">ยอดรวมทั้งหมด</div>
      <div style="font-size:16px;font-weight:600;font-family:'IBM Plex Mono',monospace">฿${fmt(total)}</div>
    </div>`;

  document.getElementById('modal-person-table').innerHTML = `<table>
    <thead><tr><th>วันที่</th><th>รายละเอียด</th><th>หมายเหตุ</th><th style="text-align:right">จำนวน (฿)</th><th>สถานะ</th></tr></thead>
    <tbody>` + items.map(r => `<tr>
      <td style="white-space:nowrap">${fmtDate(r.date)}</td>
      <td>${escHtml(r.desc)}</td>
      <td style="color:var(--text3)">${r.note ? escHtml(r.note) : '-'}</td>
      <td style="text-align:right"><span class="amount-neutral">฿${fmt(r.amount)}</span></td>
      <td><span class="badge ${r.status === 'paid' ? 'paid' : 'pending'}">${r.status === 'paid' ? 'รับแล้ว' : 'รอรับ'}</span></td>
    </tr>`).join('') + '</tbody></table>';

  document.getElementById('person-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('person-modal').classList.remove('open');
}
document.getElementById('person-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ======== DEBT ======== */
function addDebt() {
  const name = document.getElementById('d-name').value.trim();
  const desc = document.getElementById('d-desc').value.trim();
  const amount = parseFloat(document.getElementById('d-amount').value);
  const due = document.getElementById('d-due').value;
  const note = document.getElementById('d-note').value.trim();
  if (!name || !amount || isNaN(amount) || amount <= 0) {
    alert('กรุณากรอกชื่อและจำนวนเงินค่ะ');
    return;
  }
  debts.unshift({ id: Date.now(), name, desc, amount, paid: 0, due, note, status: 'unpaid' });
  saveData();
  document.getElementById('d-name').value = '';
  document.getElementById('d-desc').value = '';
  document.getElementById('d-amount').value = '';
  document.getElementById('d-due').value = '';
  document.getElementById('d-note').value = '';
  renderDebt();
}
function payDebt(id) {
  const d = debts.find(x => x.id === id);
  if (!d) return;
  const amt = parseFloat(prompt(`จ่ายหนี้ "${d.name}" เท่าไหร่? (ค้างอยู่ ฿${fmt(d.amount - d.paid)})`));
  if (isNaN(amt) || amt <= 0) return;
  d.paid = Math.min(d.amount, (d.paid || 0) + amt);
  if (d.paid >= d.amount) d.status = 'paid';
  saveData(); renderDebt();
}
function deleteDebt(id) {
  if (!confirm('ลบรายการหนี้นี้?')) return;
  debts = debts.filter(d => d.id !== id);
  saveData(); renderDebt();
}
function renderDebt() {
  const totalDebt = debts.reduce((s, d) => s + d.amount, 0);
  const totalPaid = debts.reduce((s, d) => s + (d.paid || 0), 0);
  const remaining = totalDebt - totalPaid;
  const unpaidCount = debts.filter(d => d.status !== 'paid').length;

  document.getElementById('debt-summary-stats').innerHTML = `<div class="debt-summary">
    <div class="debt-stat">
      <div class="debt-stat-label">หนี้ทั้งหมด</div>
      <div class="debt-stat-val" style="color:var(--purple)">฿${fmt(totalDebt)}</div>
    </div>
    <div class="debt-stat">
      <div class="debt-stat-label">จ่ายแล้ว</div>
      <div class="debt-stat-val" style="color:var(--green)">฿${fmt(totalPaid)}</div>
    </div>
    <div class="debt-stat">
      <div class="debt-stat-label">ยังค้างชำระ</div>
      <div class="debt-stat-val" style="color:var(--red)">฿${fmt(remaining)}</div>
    </div>
    <div class="debt-stat">
      <div class="debt-stat-label">รายการค้าง</div>
      <div class="debt-stat-val">${unpaidCount} รายการ</div>
    </div>
  </div>`;

  const el = document.getElementById('d-table');
  if (!debts.length) { el.innerHTML = '<p class="empty">ยังไม่มีรายการหนี้สินค่ะ</p>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>เจ้าหนี้/รายการ</th><th>รายละเอียด</th><th style="text-align:right">ยอดหนี้ (฿)</th><th style="text-align:right">จ่ายแล้ว (฿)</th><th style="text-align:right">คงเหลือ (฿)</th><th>ครบกำหนด</th><th>สถานะ</th><th></th></tr></thead>
    <tbody>` + debts.map(d => {
      const rem = d.amount - (d.paid || 0);
      const pct = d.amount > 0 ? Math.round((d.paid || 0) / d.amount * 100) : 0;
      return `<tr>
        <td style="font-weight:600">${escHtml(d.name)}</td>
        <td style="color:var(--text3)">${d.desc ? escHtml(d.desc) : '-'}</td>
        <td style="text-align:right"><span class="amount-neutral">฿${fmt(d.amount)}</span></td>
        <td style="text-align:right"><span class="amount-pos">฿${fmt(d.paid || 0)}</span></td>
        <td style="text-align:right"><span class="amount-neg">฿${fmt(rem)}</span></td>
        <td style="white-space:nowrap;color:var(--text3)">${d.due ? fmtDate(d.due) : '-'}</td>
        <td>
          <span class="badge ${d.status === 'paid' ? 'paid' : 'debt'}">${d.status === 'paid' ? 'ชำระแล้ว' : `${pct}%`}</span>
        </td>
        <td style="display:flex;gap:4px;flex-wrap:nowrap">
          ${d.status !== 'paid' ? `<button class="btn sm" onclick="payDebt(${d.id})" style="color:var(--green);border-color:var(--green-bg)">จ่าย</button>` : ''}
          <button class="btn sm danger" onclick="deleteDebt(${d.id})">ลบ</button>
        </td>
      </tr>`;
    }).join('') + '</tbody></table>';
}

/* ======== DASHBOARD ======== */
function renderDashboard() {
  const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const totalExpense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = totalIncome - totalExpense;
  const pendingReimb = reimbursements.filter(r => r.status === 'pending').reduce((s, r) => s + r.amount, 0);
  const totalDebtLeft = debts.reduce((s, d) => s + (d.amount - (d.paid || 0)), 0);

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">รายรับทั้งหมด</div><div class="metric-value g">฿${fmt(totalIncome)}</div></div>
    <div class="metric"><div class="metric-label">รายจ่ายทั้งหมด</div><div class="metric-value r">฿${fmt(totalExpense)}</div></div>
    <div class="metric"><div class="metric-label">คงเหลือสุทธิ</div><div class="metric-value ${balance >= 0 ? 'g' : 'r'}">฿${fmt(balance)}</div></div>
    <div class="metric"><div class="metric-label">สำรองค้างรับ</div><div class="metric-value b">฿${fmt(pendingReimb)}</div></div>
    <div class="metric"><div class="metric-label">หนี้ค้างชำระ</div><div class="metric-value p">฿${fmt(totalDebtLeft)}</div></div>`;

  // Bar chart 6 months
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      key: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      label: ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][d.getMonth()]
    });
  }
  const incData = months.map(m => Math.round(transactions.filter(t => t.type === 'income' && t.date.startsWith(m.key)).reduce((s, t) => s + t.amount, 0)));
  const expData = months.map(m => Math.round(transactions.filter(t => t.type === 'expense' && t.date.startsWith(m.key)).reduce((s, t) => s + t.amount, 0)));

  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: months.map(m => m.label),
      datasets: [
        { label: 'รายรับ', data: incData, backgroundColor: '#2d6a4f', borderRadius: 4 },
        { label: 'รายจ่าย', data: expData, backgroundColor: '#f0997b', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { ticks: { callback: v => '฿' + fmt(v), font: { size: 10 } }, grid: { color: '#e2ddd7' } }
      }
    }
  });
  document.getElementById('barLegend').innerHTML = `<div class="legend-item"><span class="legend-dot" style="background:#2d6a4f"></span>รายรับ</div><div class="legend-item"><span class="legend-dot" style="background:#f0997b"></span>รายจ่าย</div>`;

  // PCT BARS (category % of expense)
  const cats = {};
  transactions.filter(t => t.type === 'expense').forEach(t => { cats[t.cat] = (cats[t.cat] || 0) + t.amount; });
  const catKeys = Object.keys(cats).sort((a, b) => cats[b] - cats[a]);
  const colors = ['#c1440e','#2d6a4f','#1a4f8a','#92600a','#6b3a7d','#1a6b6b','#7a3f1a','#4a6741'];
  const expTotal = Object.values(cats).reduce((a, b) => a + b, 0);
  const pctEl = document.getElementById('pct-bars');
  if (catKeys.length > 0) {
    pctEl.innerHTML = catKeys.map((k, i) => {
      const pct = expTotal > 0 ? Math.round(cats[k] / expTotal * 100) : 0;
      return `<div class="pct-bar-wrap">
        <div class="pct-bar-label"><span>${escHtml(k)}</span><span style="font-family:'IBM Plex Mono',monospace;font-weight:600">${pct}% · ฿${fmt(cats[k])}</span></div>
        <div class="pct-bar-track"><div class="pct-bar-fill" style="width:${pct}%;background:${colors[i % colors.length]}"></div></div>
      </div>`;
    }).join('');
  } else {
    pctEl.innerHTML = '<p class="empty" style="padding:1rem">ยังไม่มีรายจ่าย</p>';
  }

  // PIE chart
  if (pieChartInst) pieChartInst.destroy();
  if (catKeys.length > 0) {
    pieChartInst = new Chart(document.getElementById('pieChart'), {
      type: 'doughnut',
      data: {
        labels: catKeys,
        datasets: [{ data: catKeys.map(k => Math.round(cats[k])), backgroundColor: catKeys.map((_, i) => colors[i % colors.length]), borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
    document.getElementById('pieLegend').innerHTML = catKeys.map((k, i) =>
      `<div class="legend-item"><span class="legend-dot" style="background:${colors[i % colors.length]}"></span>${escHtml(k)} ${expTotal > 0 ? Math.round(cats[k] / expTotal * 100) : 0}%</div>`
    ).join('');
  } else {
    document.getElementById('pieLegend').innerHTML = '<span style="color:var(--text3);font-size:13px">ยังไม่มีรายจ่ายค่ะ</span>';
  }
}

/* ======== UTILS ======== */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

/* ======== INIT ======== */
const today = new Date().toISOString().split('T')[0];
document.getElementById('t-date').value = today;
document.getElementById('r-date').value = today;
document.getElementById('f-month').value = today.substring(0, 7);
updateCatList();
updatePersonList();
renderDashboard();
</script>
</body>
